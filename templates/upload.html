{% extends "base.html" %}

{% block title %}Upload Photo - Email Spam Detector{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-upload"></i> Upload Portfolio Photo</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('email_controller.upload') }}" enctype="multipart/form-data">
                    <div class="mb-4 text-center">
                        <div class="upload-area" id="uploadArea" onclick="document.getElementById('photo').click()">
                            <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                            <h5>Click to Upload or Drag & Drop</h5>
                            <p class="text-muted">Supported formats: PNG, JPG, JPEG, GIF (Max 16MB)</p>
                        </div>
                        <input type="file" class="d-none" id="photo" name="photo" accept="image/*" required>
                    </div>
                    
                    <div class="mb-3" id="previewContainer" style="display: none;">
                        <label class="form-label">Preview:</label>
                        <img id="imagePreview" class="img-fluid rounded" style="max-height: 300px;">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" disabled>
                            <i class="fas fa-upload"></i> Upload Photo
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer">
                <a href="{{ url_for('email_controller.portfolio') }}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Portfolio
                </a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('photo').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById('imagePreview');
    const previewContainer = document.getElementById('previewContainer');
    const submitBtn = document.getElementById('submitBtn');
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            previewContainer.style.display = 'block';
            submitBtn.disabled = false;
        }
        reader.readAsDataURL(file);
    }
});

// Drag and drop functionality
const uploadArea = document.getElementById('uploadArea');

['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
}

['dragenter', 'dragover'].forEach(eventName => {
    uploadArea.addEventListener(eventName, highlight, false);
});

['dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, unhighlight, false);
});

function highlight() {
    uploadArea.classList.add('border-primary', 'bg-light');
}

function unhighlight() {
    uploadArea.classList.remove('border-primary', 'bg-light');
}

uploadArea.addEventListener('drop', handleDrop, false);

function handleDrop(e) {
    const dt = e.dataTransfer;
    const files = dt.files;
    document.getElementById('photo').files = files;
    
    // Trigger change event
    const event = new Event('change', { bubbles: true });
    document.getElementById('photo').dispatchEvent(event);
}
</script>

<style>
.upload-area {
    border: 2px dashed #dee2e6;
    border-radius: 10px;
    padding: 40px 20px;
    cursor: pointer;
    transition: all 0.3s;
}
.upload-area:hover {
    border-color: #0d6efd;
    background-color: #f8f9fa;
}
</style>
{% endblock %}
